# .github/workflows/ci.yml — continuous integration.
# On every PR and push to main: lint (ruff) + test (pytest, full suite with rate
# limiting disabled) for the Python api/workers, and a typecheck for the web app
# that self-skips until the frontend has a lockfile. Keeps main always green.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API + workers
        run: |
          pip install --upgrade pip
          pip install ./apps/api ./workers
          pip install pytest ruff
      - name: Lint
        run: ruff check apps/api/app workers tests
      - name: Test
        run: pytest tests -q
        env:
          RATE_LIMIT_ENABLED: "0"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Web build (generates next-env.d.ts, typechecks, lints, compiles routes)
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
            npm run build
          fi
