# docker-compose.yml — local dev stack for AduanaMap MX.
# Brings up Postgres+PostGIS (auto-applies core/migrations on first boot), Redis,
# the FastAPI api, and the ETL workers image. db/redis expose healthchecks so api
# and workers only start once dependencies are ready. Usage:
#   docker compose up -d db redis   # datastores
#   docker compose up api           # API at http://localhost:8000/docs
#   docker compose run --rm workers python -m workers.banxico_fix
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: aduana
      POSTGRES_PASSWORD: aduana
      POSTGRES_DB: aduanamap
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./core/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aduana -d aduanamap"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aduana:aduana@db:5432/aduanamap
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aduana:aduana@db:5432/aduanamap
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    # Cron real se define en infra/; aquí queda como one-shot invocable:
    # docker compose run --rm workers python -m workers.banxico_fix
    command: ["python", "-c", "print('workers image ready — invoke a job, e.g. python -m workers.banxico_fix')"]

volumes:
  db_data:
